<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌺 沖繩旅遊情報站 - 地圖聯動完美版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary-color: #0077b6;
            --secondary-color: #00b4d8;
            --accent-color: #ffb703;
            --bg-color: #f0f8ff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* 左側：表單 */
        .left-panel {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            border-top: 8px solid var(--primary-color);
            height: fit-content;
        }

        /* 中間：清單與分頁標籤 */
        .middle-panel {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            flex: 1.5;
            min-width: 350px;
            border-top: 8px solid var(--accent-color);
        }

        /* 右側：地圖 */
        .right-panel {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            flex: 1.5;
            min-width: 350px;
            border-top: 8px solid #2a9d8f;
            height: 620px;
            display: flex;
            flex-direction: column;
        }

        h1, h2 { color: var(--primary-color); margin-top: 0; margin-bottom: 15px; }
        
        /* 表單樣式 */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input[type="text"], input[type="url"], textarea, select {
            width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .note-text { font-size: 11px; color: #666; margin-top: 3px; }

        button {
            width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--secondary-color); }

        /* 分頁標籤樣式 */
        .tabs {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tab {
            padding: 8px 14px; background-color: #e9ecef; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; color: #495057; transition: 0.2s;
        }
        .tab.active { background-color: var(--primary-color); color: white; }

        /* 清單項目樣式 */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .list-item {
            padding: 12px; border-radius: 8px; background-color: #f8f9fa; border-left: 5px solid var(--secondary-color); transition: 0.2s; cursor: pointer;
        }
        .list-item:hover {
            background-color: #e2e8f0;
            border-left-color: var(--primary-color);
        }
        .item-category { font-size: 11px; padding: 2px 6px; background-color: #e2e8f0; border-radius: 4px; font-weight: bold; }
        .item-title { font-size: 16px; font-weight: bold; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .item-title span { color: #333; }
        .item-link { color: var(--primary-color); text-decoration: none; font-size: 18px; padding: 0 5px; }
        .item-link:hover { transform: scale(1.2); }
        .item-note { color: #666; font-size: 13px; background: #fff; padding: 5px 8px; border-radius: 4px; margin-top: 4px; border-left: 2px solid #ddd; pointer-events: none; }

        /* 地圖容器 */
        #map { width: 100%; flex-grow: 1; border-radius: 8px; border: 1px solid #ddd; }

        #statusMessage { margin-top: 10px; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .loading { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-panel">
        <h1>🌺 沖繩新增</h1>
        <form id="travelForm">
            <div class="form-group">
                <label for="category">📌 分類</label>
                <select id="category" required>
                    <option value="🍽️ 美食（食）">🍽️ 美食（食）</option>
                    <option value="🏨 住宿（住）">🏨 住宿（住）</option>
                    <option value="🚗 交通（行）">🚗 交通（行）</option>
                    <option value="📸 景點（遊）">📸 景點（遊）</option>
                    <option value="🛍️ 購物/玩樂（玩）">🛍️ 購物/玩樂（玩）</option>
                </select>
            </div>
            <div class="form-group">
                <label for="title">✏️ 名稱</label>
                <input type="text" id="title" placeholder="例如：美麗海水族館" required>
            </div>
            <div class="form-group">
                <label for="url">🔗 網址 (網誌或 Google Map 分享連結)</label>
                <input type="url" id="url" placeholder="https://..." required>
            </div>
            <div class="form-group">
                <label for="note">💬 地圖座標 (可選，用於釘地圖藍標)</label>
                <input type="text" id="note" placeholder="例如：26.6943, 127.8779">
                <div class="note-text">💡 提示：在 Google Map 景點點右鍵複製座標貼上，點擊清單時地圖會飛過去喔！原備註功能可併入名稱。</div>
            </div>
            <button type="submit" id="submitBtn">✈️ 送出</button>
        </form>
        <div id="statusMessage"></div>
    </div>

    <div class="middle-panel">
        <h2>📝 收集清單</h2>
        <div class="tabs" id="tabsContainer">
            <div class="tab active" onclick="switchTab('All')">🔍 全部 All</div>
            <div class="tab" onclick="switchTab('🍽️ 美食（食）')">🍽️ 美食</div>
            <div class="tab" onclick="switchTab('🏨 住宿（住）')">🏨 住宿</div>
            <div class="tab" onclick="switchTab('🚗 交通（行）')">🚗 交通</div>
            <div class="tab" onclick="switchTab('📸 景點（遊）')">📸 景點</div>
            <div class="tab" onclick="switchTab('🛍️ 購物/玩樂（玩）')">🛍️ 玩樂</div>
        </div>
        <div id="listLoading" style="text-align:center;">同步中...</div>
        <div class="list-container" id="listContainer"></div>
    </div>

    <div class="right-panel">
        <h2>🗺️ 沖繩互動地圖</h2>
        <div id="map"></div>
        <p style="font-size: 12px; color: #666; margin: 5px 0 0 0;">💡 互動指南：直接<b>點擊中間的景點卡片</b>，地圖就會瞬間飛過去並跳出標籤！點擊右側的 🔗 可以打開原網頁。</p>
    </div>
</div>

<script>
    // ⚠️ 請在此處替換成你的 Google Apps Script 網頁應用程式網址
    const GAS_WEB_APP_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
    
    let allData = []; 
    let currentTab = 'All'; 
    let map;
    let markersMap = {}; // 用來存放所有地圖標記的物件，方便後續用 ID 對應觸發

    window.onload = function() {
        initMap();
        fetchList();
    };

    function initMap() {
        // 設定預設定位在沖繩那霸
        map = L.map('map').setView([26.2124, 127.6809], 10); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    }

    function fetchList() {
        const container = document.getElementById('listContainer');
        const loadingText = document.getElementById('listLoading');
        loadingText.style.display = 'block';

        fetch(GAS_WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            loadingText.style.display = 'none';
            allData = data.reverse(); 
            renderList();
        })
        .catch(error => {
            console.error('Error:', error);
            loadingText.innerText = '❌ 無法讀取資料，請檢查 GAS 設定。';
        });
    }

    function switchTab(category) {
        currentTab = category;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        renderList();
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = '';

        const filteredData = allData.filter(item => {
            if (currentTab === 'All') return true;
            return item.category === currentTab;
        });

        // 重新繪製地圖標記
        updateMapMarkers(filteredData);

        if (filteredData.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">此分類目前沒有資料喔！</div>';
            return;
        }

        filteredData.forEach((item, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'list-item';
            
            // 檢查這筆資料是否有填座標 (我們把它存在試算表的 note 欄位)
            const hasCoords = parseCoordinates(item.note) ? 'style="color:#0077b6;"' : 'style="color:#999;"';
            const locationIcon = parseCoordinates(item.note) ? '📍' : '🔗';
            
            itemDiv.innerHTML = `
                <div>
                    <span class="item-category">${item.category}</span>
                    <div class="item-title">
                        <span>${locationIcon} ${item.title}</span>
                        <a class="item-link" href="${item.url}" target="_blank" onclick="event.stopPropagation();">🔗</a>
                    </div>
                </div>
            `;

            // 核心功能：為整個卡片綁定點擊事件！
            itemDiv.addEventListener('click', () => {
                focusOnMarker(item.note, item.title, index);
            });

            container.appendChild(itemDiv);
        });
    }

    // 解析字串是否為有效座標 (例如 "26.6943, 127.8779")
    function parseCoordinates(str) {
        if (!str) return null;
        const parts = str.split(',');
        if (parts.length === 2) {
            const lat = parseFloat(parts[0].trim());
            const lng = parseFloat(parts[1].trim());
            if (!isNaN(lat) && !isNaN(lng)) {
                return { lat, lng };
            }
        }
        return null;
    }

    // 更新地圖標記
    function updateMapMarkers(data) {
        // 清除舊的標記
        for (let key in markersMap) {
            map.removeLayer(markersMap[key]);
        }
        markersMap = {};

        data.forEach((item, index) => {
            const coords = parseCoordinates(item.note);
            if (coords) {
                // 在地圖上釘上小藍標，並將它存入 markersMap 物件中，Key值為 index
                const marker = L.marker([coords.lat, coords.lng]).addTo(map)
                 .bindPopup(`<b>${item.category} - ${item.title}</b><br><a href="${item.url}" target="_blank">打開外部連結</a>`);
                
                markersMap[index] = marker;
            }
        });
    }

    // 當使用者點擊卡片時，地圖平移並放大跳出氣泡
    function focusOnMarker(coordStr, title, index) {
        const coords = parseCoordinates(coordStr);
        if (coords) {
            // 1. 地圖飛過去 (飛到指定座標，放大層級設為 14)
            map.setView([coords.lat, coords.lng], 14, { animate: true, duration: 1 });
            
            // 2. 自動主動彈出該標記的氣泡窗
            if (markersMap[index]) {
                markersMap[index].openPopup();
            }
        } else {
            alert(`提示：「${title}」在輸入時沒有填寫地圖座標，因此地圖無法定位。您可以點擊右側的 🔗 圖示直接打開網址！`);
        }
    }

    // 表單送出
    document.getElementById('travelForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        submitBtn.disabled = true;
        statusMessage.className = 'loading';
        statusMessage.innerText = '正在傳送...✈️';
        statusMessage.style.display = 'block';

        const formData = {
            category: document.getElementById('category').value,
            title: document.getElementById('title').value,
            url: document.getElementById('url').value,
            note: document.getElementById('note').value // 這邊直接把經緯度字串送到試算表的備註欄
        };

        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => {
            statusMessage.className = 'success';
            statusMessage.innerText = '🎉 成功加入！';
            
            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
            document.getElementById('note').value = '';

            setTimeout(fetchList, 1000); 
            setTimeout(() => { statusMessage.style.display = 'none'; }, 3000);
        })
        .catch(error => {
            statusMessage.className = 'error';
            statusMessage.innerText = '❌ 傳送失敗。';
        })
        .finally(() => {
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
