<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌺 ㄚ北裝可愛專屬沖繩旅遊情報站</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary-color: #0077b6;
            --secondary-color: #00b4d8;
            --accent-color: #ffb703;
            --bg-color: #f0f8ff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* 左側：表單與 AI 區塊 */
        .left-panel {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .form-card { border-top: 8px solid var(--primary-color); }
        .ai-card { border-top: 8px solid #9b59b6; }

        /* 中間：清單與分頁標籤 */
        .middle-panel {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            flex: 1.5;
            min-width: 350px;
            border-top: 8px solid var(--accent-color);
        }

        /* 右側：地圖 */
        .right-panel {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            flex: 1.5;
            min-width: 350px;
            border-top: 8px solid #2a9d8f;
            height: 750px;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 15px; }
        h3 { color: #9b59b6; }
        
        /* 表單與通用輸入框樣式 */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input[type="text"], input[type="url"], textarea, select {
            width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        .note-text { font-size: 11px; color: #666; margin-top: 3px; }

        button {
            width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--secondary-color); }
        .ai-btn { background-color: #9b59b6; }
        .ai-btn:hover { background-color: #8e44ad; }

        /* AI 輸出對話框 */
        #aiResponse {
            margin-top: 15px; padding: 12px; background-color: #f5f0f9; border-left: 4px solid #9b59b6; border-radius: 6px; font-size: 14px; line-height: 1.6; max-height: 200px; overflow-y: auto; display: none; white-space: pre-line;
        }

        /* 分頁標籤樣式 */
        .tabs {
            display: flex; gap: 5px; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 15px; overflow-x: auto; white-space: nowrap;
        }
        .tab {
            padding: 8px 14px; background-color: #e9ecef; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; color: #495057; transition: 0.2s;
        }
        .tab.active { background-color: var(--primary-color); color: white; }

        /* 清單項目樣式 */
        .list-container { display: flex; flex-direction: column; gap: 12px; max-height: 620px; overflow-y: auto; }
        .list-item { padding: 12px; border-radius: 8px; background-color: #f8f9fa; border-left: 5px solid var(--secondary-color); transition: 0.2s; cursor: pointer; }
        .list-item:hover { background-color: #e2e8f0; border-left-color: var(--primary-color); }
        .item-category { font-size: 11px; padding: 2px 6px; background-color: #e2e8f0; border-radius: 4px; font-weight: bold; }
        .item-title { font-size: 16px; font-weight: bold; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .item-link { color: var(--primary-color); text-decoration: none; font-size: 18px; padding: 0 5px; }
        .item-note { color: #555; font-size: 13px; background: #fff; padding: 6px 10px; border-radius: 4px; margin-top: 6px; border-left: 3px solid var(--secondary-color); pointer-events: none; }

        /* 地圖容器 */
        #map { width: 100%; flex-grow: 1; border-radius: 8px; border: 1px solid #ddd; }

        #statusMessage { margin-top: 10px; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .loading { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-panel">
        <div class="card form-card">
            <h1>🌺 沖繩新增</h1>
            <form id="travelForm">
                <div class="form-group">
                    <label for="category">📌 分類</label>
                    <select id="category" required>
                        <option value="🍽️ 美食（食）">🍽️ 美食（食）</option>
                        <option value="🏨 住宿（住）">🏨 住宿（住）</option>
                        <option value="🚗 交通（行）">🚗 交通（行）</option>
                        <option value="📸 景點（遊）">📸 景點（遊）</option>
                        <option value="🛍️ 購物/玩樂（玩）">🛍️ 購物/玩樂（玩）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="title">✏️ 名稱</label>
                    <input type="text" id="title" placeholder="例如：古宇利大橋" required>
                </div>
                <div class="form-group">
                    <label for="url">🔗 網址 (選填)</label>
                    <input type="url" id="url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="coords">🗺️ 地圖座標 (選填)</label>
                    <input type="text" id="coords" placeholder="例如：26.6943, 127.8779">
                </div>
                <div class="form-group">
                    <label for="note">💬 旅遊備註 (選填)</label>
                    <textarea id="note" rows="2" placeholder="備註..."></textarea>
                </div>
                <button type="submit" id="submitBtn">✈️ 送出</button>
            </form>
            <div id="statusMessage"></div>
        </div>

        <div class="card ai-card">
            <h3>🤖 AI 沖繩小導遊</h3>
            <div class="form-group">
                <textarea id="aiQuestion" rows="3" placeholder="例如：幫我用現有清單規劃一個順路的兩天一夜行程，並告訴我交通怎麼排最順？"></textarea>
            </div>
            <button class="ai-btn" onclick="askGeminiAI()" id="aiBtn">✨ 請 AI 規劃</button>
            <div id="aiResponse"></div>
        </div>
    </div>

    <div class="middle-panel">
        <h2>📝 收集清單</h2>
        <div class="tabs" id="tabsContainer">
            <div class="tab active" onclick="switchTab('All')">🔍 全部 All</div>
            <div class="tab" onclick="switchTab('🍽️ 美食（食）')">🍽️ 美食</div>
            <div class="tab" onclick="switchTab('🏨 住宿（住）')">🏨 住宿</div>
            <div class="tab" onclick="switchTab('🚗 交通（行）')">🚗 交通</div>
            <div class="tab" onclick="switchTab('📸 景點（遊）')">📸 景點</div>
            <div class="tab" onclick="switchTab('🛍️ 購物/玩樂（玩）')">🛍️ 玩樂</div>
        </div>
        <div id="listLoading" style="text-align:center;">同步中...</div>
        <div class="list-container" id="listContainer"></div>
    </div>

    <div class="right-panel">
        <h2>🗺️ 沖繩互動地圖</h2>
        <div id="map"></div>
        <p style="font-size: 12px; color: #666; margin: 5px 0 0 0;">💡 互動指南：點擊中間景點卡片地圖會自動對焦；在下方問 AI 它能直接幫你排行程！</p>
    </div>
</div>

<script>
    // ⚠️ 填入你的 Google Apps Script 網頁應用程式網址
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzpnKUJWOn0w9YLhAFN5Bcd3OIOR7yo1IiHewrN2It75HHPRwAjDJsQy0uxVEM2VVV_/exec';
    
    let allData = []; 
    let currentTab = 'All'; 
    let map;
    let markersMap = {}; 

    window.onload = function() {
        initMap();
        fetchList();
    };

    function initMap() {
        map = L.map('map').setView([26.2124, 127.6809], 10); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);
    }

    function fetchList() {
        const container = document.getElementById('listContainer');
        const loadingText = document.getElementById('listLoading');
        loadingText.style.display = 'block';

        fetch(GAS_WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            loadingText.style.display = 'none';
            allData = data.reverse(); 
            renderList();
        })
        .catch(error => {
            console.error('Error:', error);
            loadingText.innerText = '❌ 無法同步資料。';
        });
    }

    function switchTab(category) {
        currentTab = category;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        renderList();
    }

    function parseCoordinates(coordStr) {
        if (!coordStr) return null;
        const parts = coordStr.split(',');
        if (parts.length === 2) {
            const lat = parseFloat(parts[0].trim());
            const lng = parseFloat(parts[1].trim());
            if (!isNaN(lat) && !isNaN(lng)) return { lat, lng };
        }
        return null;
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = '';

        const filteredData = allData.filter(item => {
            if (currentTab === 'All') return true;
            return item.category === currentTab;
        });

        updateMapMarkers(filteredData);

        if (filteredData.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">此分類目前沒有資料喔！</div>';
            return;
        }

        filteredData.forEach((item, index) => {
            const coords = parseCoordinates(item.coords);
            const locationIcon = coords ? '📍' : '🔗';
            const linkHtml = item.url ? `<a class="item-link" href="${item.url}" target="_blank" onclick="event.stopPropagation();">🔗</a>` : '';
            const noteHtml = item.note ? `<div class="item-note">💬 ${item.note}</div>` : '';
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'list-item';
            itemDiv.innerHTML = `
                <div>
                    <span class="item-category">${item.category}</span>
                    <div class="item-title">
                        <span>${locationIcon} ${item.title}</span>
                        ${linkHtml}
                    </div>
                    ${noteHtml}
                </div>
            `;

            itemDiv.addEventListener('click', () => {
                if (coords) {
                    map.setView([coords.lat, coords.lng], 14, { animate: true, duration: 1 });
                    if (markersMap[index]) markersMap[index].openPopup();
                } else {
                    alert(`提示：「${item.title}」沒有填寫地圖座標，無法定位。`);
                }
            });
            container.appendChild(itemDiv);
        });
    }

    function updateMapMarkers(data) {
        for (let key in markersMap) { map.removeLayer(markersMap[key]); }
        markersMap = {};

        data.forEach((item, index) => {
            const coords = parseCoordinates(item.coords);
            if (coords) {
                // const popupContent = `<b>${item.category} - ${item.title}</b>${item.note ? `<br><span style='color:#666;font-size:12px;'>${item.note}</span>` : ''}`;
                const popupContent = `<b>${item.category} - ${item.title}</b>${item.note ? `<br><span style='color:#666;font-size:12px;'>${item.note}</span>` : ''}<br><a href="${item.url}" target="_blank">打開連結</a>`;
                markersMap[index] = L.marker([coords.lat, coords.lng]).addTo(map).bindPopup(popupContent);
            }
        });
    }

    // 🌟 核心功能：連動呼叫 Gemini 1.5 Flash API
    async function askGeminiAI() {
        const questionField = document.getElementById('aiQuestion');
        const responseBox = document.getElementById('aiResponse');
        const aiBtn = document.getElementById('aiBtn');
        const userQuestion = questionField.value.trim();
    
        if (!userQuestion) { alert('請輸入你想問 AI 的旅遊問題！'); return; }
        if (allData.length === 0) { alert('目前沒有收集任何景點，AI 無法分析喔！'); return; }
    
        aiBtn.disabled = true;
        aiBtn.innerText = '🔮 AI 正在通靈規劃中...';
        responseBox.style.display = 'block';
        responseBox.innerText = '💡 正在安全傳送至後端分析中，請稍候幾秒鐘...';
    
        const listContext = allData.map((item, idx) => {
            return `[景點${idx+1}] 分類:${item.category}, 名稱:${item.title}, 座標:[${item.coords || '無'}], 備註:${item.note || '無'}`;
        }).join('\n');
    
        const fullPrompt = `你是一位專業的沖繩旅遊規劃專家。以下是用戶目前的候選清單：\n\n${listContext}\n\n請完全基於以上清單，用親切的繁體中文回答問題：${userQuestion}`;
    
        try {
            // 🌟 改為直接 POST 給你的 GAS 網址，把 Key 的事交給後端
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "askAI",
                    prompt: fullPrompt
                })
            });
    
            // 備註：因為 GAS 重新導向或 no-cors 的限制，
            // 如果你之前 GAS 沒設定妥當，最安全的讀取回傳方式是直接解析
            const result = await response.json();
            if(result.result === "success") {
                responseBox.innerText = result.reply;
            } else {
                responseBox.innerText = '❌ 後端 AI 處理失敗：' + result.message;
            }
        } catch (error) {
            console.error(error);
            // 💡 提示：如果遇到 CORS 攔截導致前端抓不到 JSON，
            // 建議在本地端測試，或者確保 GAS 部署時有選擇「任何人」皆可執行。
            responseBox.innerText = '❌ 傳送請求至後端時發生錯誤，請確認 GAS 是否已重新部署為新版本。';
        } finally {
            aiBtn.disabled = false;
            aiBtn.innerText = '✨ 請 AI 規劃';
        }
    }

    // 表單送出
    document.getElementById('travelForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        submitBtn.disabled = true;
        statusMessage.className = 'loading'; statusMessage.innerText = '正在傳送...✈️'; statusMessage.style.display = 'block';

        const formData = {
            category: document.getElementById('category').value,
            title: document.getElementById('title').value,
            url: document.getElementById('url').value,
            coords: document.getElementById('coords').value.trim(),
            note: document.getElementById('note').value.trim()
        };

        fetch(GAS_WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) })
        .then(() => {
            statusMessage.className = 'success'; statusMessage.innerText = '🎉 成功加入！';
            document.getElementById('title').value = ''; document.getElementById('url').value = ''; document.getElementById('coords').value = ''; document.getElementById('note').value = '';
            setTimeout(fetchList, 1000); 
            setTimeout(() => { statusMessage.style.display = 'none'; }, 3000);
        })
        .catch(() => { statusMessage.className = 'error'; statusMessage.innerText = '❌ 傳送失敗。'; })
        .finally(() => { submitBtn.disabled = false; });
    });
</script>

</body>
</html>
